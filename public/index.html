<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login - CLUB SOLO CIEN</title>

<style>

*{
box-sizing:border-box;
}

body{

background:#000;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

margin:0;

padding:20px;

color:white;

}

/* container principal */

.container{

background:#0b0b0b;

padding:40px;

border-radius:12px;

width:100%;

max-width:420px;

box-shadow:0 0 25px rgba(0,0,0,0.6);

}

/* titulo */

.container h2{

text-align:center;

margin-bottom:25px;

}

/* inputs */

input{

width:100%;

padding:14px;

margin-top:12px;

border-radius:6px;

border:none;

background:#e5e5e5;

font-size:14px;

}

/* captcha */

.captchaBox{

margin-top:15px;

background:#1c1c1c;

padding:15px;

border-radius:6px;

text-align:center;

font-weight:bold;

font-size:18px;

letter-spacing:3px;

}

/* boton */

button{

width:100%;

margin-top:18px;

padding:14px;

background:#00c853;

border:none;

border-radius:6px;

color:white;

font-size:16px;

cursor:pointer;

transition:0.2s;

}

button:hover{

background:#00b34a;

}

/* links */

p{

text-align:center;

margin-top:18px;

}

a{

color:#00c853;

text-decoration:none;

}

.passwordToggle{

margin-top:8px;

font-size:13px;

color:#aaa;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<h2>Iniciar sesión</h2>

<input id="cedula" placeholder="Cédula">

<input id="password" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<p>
¿No tienes cuenta?  
<a href="/register.html">Registrarse</a>
</p>

</div>

<script>

async function login(){

const data = {

cedula:document.getElementById("cedula").value,
password:document.getElementById("password").value

}

const res = await fetch("/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

const result = await res.json()

if(result.token){

localStorage.setItem("token",result.token)

window.location="/dashboard.html"

}else{

alert(result.message)

}

}

</script>

</body>

</html>
