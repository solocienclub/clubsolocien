<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CLUB SOLO CIEN</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.board{
position:relative;
width:100%;
max-width:500px;
aspect-ratio:1024/1536;
}

.board img{
width:100%;
height:100%;
}

.grid{

position:absolute;

top:48%;
left:7%;

width:86%;
height:45%;

display:grid;

grid-template-columns:repeat(10,1fr);
grid-template-rows:repeat(10,1fr);

}

.cell{

border:1px solid rgba(255,255,255,0.5);

display:flex;
align-items:center;
justify-content:center;

color:white;

font-family:Arial;
font-weight:bold;

font-size:clamp(10px,2vw,18px);

cursor:pointer;

}

/* contador */

.timer{

font-size:12px;
font-weight:bold;
color:orange;

}

/* vendido */

.soldIcon{

font-size:20px;
color:red;

}

</style>

</head>

<body>

<div class="board">

<img src="carton.png">

<div class="grid" id="grid"></div>

</div>

<script>

const grid = document.getElementById("grid")

for(let i=0;i<100;i++){

const number = String(i).padStart(2,"0")

const cell = document.createElement("div")

cell.className="cell"

cell.dataset.number = number

cell.innerText = number

cell.onclick = ()=>reserve(number)

grid.appendChild(cell)

}

function renderNumber(cell,status,number,reserved_at){

if(status === "available"){

cell.innerHTML = number

}

if(status === "reserved"){

const timer = document.createElement("div")

timer.className = "timer"

timer.dataset.time = reserved_at

cell.innerHTML = ""

cell.appendChild(timer)

}

if(status === "sold"){

cell.innerHTML = '<div class="soldIcon">✕</div>'

}

}

async function loadNumbers(){

const res = await fetch("/numbers")

const numbers = await res.json()

numbers.forEach(n=>{

const cell = document.querySelector(

`[data-number="${n.number}"]`

)

if(cell){

renderNumber(cell,n.status,n.number,n.reserved_at)

}

})

}

function updateTimers(){

const timers = document.querySelectorAll(".timer")

timers.forEach(timer=>{

const reservedAt = new Date(timer.dataset.time)

const now = new Date()

const diff = 300000 - (now - reservedAt)

if(diff <= 0){

timer.innerText = "00:00"

return

}

const minutes = Math.floor(diff/60000)

const seconds = Math.floor((diff%60000)/1000)

timer.innerText =
String(minutes).padStart(2,"0") +
":" +
String(seconds).padStart(2,"0")

})

}

async function reserve(number){

const res = await fetch("/numbers/reserve",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({number})

})

const data = await res.json()

alert(data.message)

loadNumbers()

}

setInterval(updateTimers,1000)

setInterval(loadNumbers,5000)

loadNumbers()

</script>

</body>
</html>
