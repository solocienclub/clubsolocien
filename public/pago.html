<!DOCTYPE html>
<html>

<head>

<title>Pago</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

button{
padding:15px 30px;
font-size:18px;
background:#2ecc71;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Pago de número</h1>

<p id="info"></p>

<button onclick="pagar()">
Pagar con PSE
</button>

<script>

const token = localStorage.getItem("token")

const params = new URLSearchParams(window.location.search)

const raffle = params.get("raffle")

const number = params.get("numbers")

document.getElementById("info").innerText =
"Número seleccionado: "+number

async function pagar(){

try{

const res = await fetch("/numbers/confirm",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:token
},

body:JSON.stringify({

raffle_id:raffle,
number:number,
amount:20000

})

})

const data = await res.json()

alert(data.message)

window.location="/dashboard.html"

}catch(error){

console.log(error)

}

}

</script>

</body>

</html>
