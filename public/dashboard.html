<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

.header{
background:black;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
margin:0;
}

/* BOTONES */

button{
padding:10px 18px;
border:none;
border-radius:5px;
cursor:pointer;
margin-left:10px;
}

.adminBtn{
background:#ff9800;
color:white;
}

.logoutBtn{
background:#e53935;
color:white;
}

.editBtn{
background:#1976d2;
color:white;
margin-top:10px;
}

/* DASHBOARD */

.dashboard{
padding:40px;
}

/* PERFIL */

.profile{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
margin-bottom:30px;
display:flex;
align-items:center;
gap:20px;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
}

.profile-info h3{
margin:0;
}

.profile-info p{
margin:4px 0;
color:#555;
}

/* RIFA */

/* CONTENEDOR DE RIFAS */

#raffleContainer{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-top:20px;
}

/* TARJETA RIFA */

.raffle{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
width:280px;
}

/* IMAGEN RIFA */

.raffle img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
margin-top:10px;
}

.raffle button{
margin-top:10px;
width:100%;
}
</style>

</head>

<body>

<div class="header">

<h2>CLUB SOLO CIEN</h2>

<div>

<button id="adminButton" class="adminBtn" style="display:none;" onclick="goAdmin()">
Panel Administrador
</button>

<button class="logoutBtn" onclick="logout()">
Cerrar sesión
</button>

</div>

</div>

<div class="dashboard">

<!-- PERFIL -->

<div class="profile">

<img id="profilePhoto" src="/uploads/predeterminada.png">

<div class="profile-info">

<h3 id="profileName">Cargando...</h3>

<p id="profileCedula"></p>

<p id="profileEmail"></p>

<button class="editBtn" onclick="editProfile()">
Editar perfil
</button>

</div>

</div>

<h1>Panel principal</h1>

<h2>Rifa disponible</h2>

<div id="raffleContainer"></div>

</div>

<script>

/* TOKEN */

function parseJwt(token){
return JSON.parse(atob(token.split('.')[1]))
}

const token = localStorage.getItem("token")

if(!token){
window.location="/login.html"
}

const user = parseJwt(token)

/* ADMIN BUTTON */

if(user.role === "admin"){
document.getElementById("adminButton").style.display="inline-block"
}

/* FUNCIONES */

function goAdmin(){
window.location="/admin/admin.html"
}

function logout(){
localStorage.removeItem("token")
window.location="/login.html"
}

function editProfile(){
window.location="/editar-perfil.html"
}

/* CARGAR PERFIL */

async function loadProfile(){

try{

const res = await fetch("/users/me",{
headers:{Authorization:token}
})

const data = await res.json()

const fullName = `${data.name || ""} ${data.lastname || ""}`

document.getElementById("profileName").innerText = fullName

document.getElementById("profileCedula").innerText =
"Cédula: " + user.cedula

document.getElementById("profileEmail").innerText =
data.email || ""

let photo="/uploads/predeterminada.png"

if(data.photo){
photo="/uploads/"+data.photo
}

document.getElementById("profilePhoto").src=photo

}catch(error){

console.log(error)

}

}

/* DASHBOARD */

async function loadDashboard(){

try{

const res = await fetch("/raffles/active")

const raffles = await res.json()

const container = document.getElementById("raffleContainer")

if(raffles.length === 0){

container.innerHTML=`
<div class="raffle">
<h3>No hay rifas disponibles</h3>
</div>
`

return
}

let html=""

raffles.forEach(r=>{

let image=""

if(r.prize_image){
image=`<img src="/uploads/${r.prize_image}">`
}

html+=`

<div class="raffle">

<h3>${r.title}</h3>

<p><b>Premio:</b> ${r.prize || "No especificado"}</p>

<p><b>Precio:</b> $${r.ticket_price}</p>

${image}

<button onclick="enterRaffle(${r.id})">
Entrar a la rifa
</button>

<button onclick="myNumbers(${r.id})">
Ver mis números
</button>

</div>

`

})

container.innerHTML = html

}catch(error){

console.log(error)

}

}

function enterRaffle(id){
window.location="/rifa.html?id="+id
}

function myNumbers(id){
window.location="/mis-numeros.html?raffle="+id
}

/* INICIAR */

loadProfile()
loadDashboard()

</script>

</body>

</html>
