<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registro - CLUB SOLO CIEN</title>

<style>

*{
box-sizing:border-box;
}

body{

background:#000;

font-family:Arial;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

margin:0;

padding:20px;

color:white;

}

/* container principal */

.container{

background:#0b0b0b;

padding:40px;

border-radius:12px;

width:100%;

max-width:420px;

box-shadow:0 0 25px rgba(0,0,0,0.6);

}

/* titulo */

.container h2{

text-align:center;

margin-bottom:25px;

}

/* inputs */

input{

width:100%;

padding:14px;

margin-top:12px;

border-radius:6px;

border:none;

background:#e5e5e5;

font-size:14px;

}

/* captcha */

.captchaBox{

margin-top:15px;

background:#1c1c1c;

padding:15px;

border-radius:6px;

text-align:center;

font-weight:bold;

font-size:18px;

letter-spacing:3px;

}

/* boton */

button{

width:100%;

margin-top:18px;

padding:14px;

background:#00c853;

border:none;

border-radius:6px;

color:white;

font-size:16px;

cursor:pointer;

transition:0.2s;

}

button:hover{

background:#00b34a;

}

/* links */

p{

text-align:center;

margin-top:18px;

}

a{

color:#00c853;

text-decoration:none;

}

.passwordToggle{

margin-top:8px;

font-size:13px;

color:#aaa;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<h2>Crear cuenta</h2>

<input id="name" placeholder="Nombres">

<input id="lastname" placeholder="Apellidos">

<input id="email" placeholder="Correo">

<input id="cedula" placeholder="Cédula">

<input id="phone" placeholder="Teléfono">

<input id="password" type="password" placeholder="Contraseña">

<input id="confirmPassword" type="password" placeholder="Confirmar contraseña">

<div class="passwordToggle" onclick="togglePassword()">
Mostrar contraseña
</div>

<div class="captchaBox">

<span id="captchaText"></span>

</div>

<input id="captchaInput" placeholder="Escribe el captcha">

<button onclick="register()">Registrarse</button>

<p>
¿Ya tienes cuenta?  
<a href="/login.html">Iniciar sesión</a>
</p>

</div>

<script>

let captchaValue=""

function generateCaptcha(){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"

captchaValue=""

for(let i=0;i<5;i++){

captchaValue+=chars[Math.floor(Math.random()*chars.length)]

}

document.getElementById("captchaText").innerText=captchaValue

}

generateCaptcha()

function togglePassword(){

const p=document.getElementById("password")

const c=document.getElementById("confirmPassword")

if(p.type==="password"){

p.type="text"
c.type="text"

}else{

p.type="password"
c.type="password"

}

}

async function register(){

const password=document.getElementById("password").value
const confirm=document.getElementById("confirmPassword").value

if(password!==confirm){

alert("Las contraseñas no coinciden")
return

}

const captchaInput=document.getElementById("captchaInput").value

if(captchaInput!==captchaValue){

alert("Captcha incorrecto")
generateCaptcha()
return

}

const data={

name:document.getElementById("name").value,
lastname:document.getElementById("lastname").value,
email:document.getElementById("email").value,
password:password,
cedula:document.getElementById("cedula").value,
phone:document.getElementById("phone").value

}

const res=await fetch("/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

const result=await res.json()

if(result.token){

localStorage.setItem("token",result.token)

window.location="/dashboard.html"

}else{

alert(result.message)

}

}

</script>

</body>

</html>
