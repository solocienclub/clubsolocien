<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mis boletos</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

.header{
background:black;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 18px;
border:none;
border-radius:5px;
background:#1976d2;
color:white;
cursor:pointer;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

/* BOLETOS */

.tickets{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.ticket{

width:260px;
background:white;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.15);
overflow:hidden;
display:flex;
flex-direction:column;

}

.ticket img{
width:100%;
height:150px;
object-fit:cover;
}

.ticket-body{
padding:15px;
}

.ticket h3{
margin:0;
font-size:18px;
}

.ticket p{
margin:6px 0;
color:#555;
font-size:14px;
}

/* NUMERO GRANDE */

.number{
margin-top:10px;
background:#2ecc71;
color:white;
text-align:center;
font-size:30px;
font-weight:bold;
padding:12px;
border-radius:8px;
}

.empty{
background:white;
padding:40px;
text-align:center;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<h2>Mis boletos</h2>

<button onclick="goDashboard()">Volver</button>

</div>

<div class="container">

<div id="tickets" class="tickets"></div>

</div>

<script>

const token = localStorage.getItem("token")

if(!token){
window.location="/login.html"
}

/* obtener rifa desde la URL */

const params = new URLSearchParams(window.location.search)
const raffleId = params.get("raffle")

function goDashboard(){
window.location="/dashboard.html"
}

async function loadTickets(){

try{

/* construir url */

let url = "/numbers/my"

if(raffleId){
url += "?raffle=" + raffleId
}

const res = await fetch(url,{
headers:{Authorization:token}
})

const tickets = await res.json()

const container = document.getElementById("tickets")

if(tickets.length === 0){

container.innerHTML=`
<div class="empty">
<h3>No tienes números comprados en esta rifa</h3>
</div>
`

return
}

let html=""

tickets.forEach(t=>{

let image="/uploads/predeterminada.png"

if(t.prize_image){
image="/uploads/"+t.prize_image
}

const fecha = t.sold_at
? new Date(t.sold_at).toLocaleDateString("es-CO")
: "Sin fecha"

html+=`

<div class="ticket">

<img src="${image}">

<div class="ticket-body">

<h3>${t.title}</h3>

<p><b>Premio:</b> ${t.prize}</p>

<p><b>Precio:</b> $${t.ticket_price}</p>

<p><b>Fecha:</b> ${fecha}</p>

<div class="number">
${t.number}
</div>

</div>

</div>

`

})

container.innerHTML = html

}catch(error){

console.log("Error cargando boletos",error)

}

}

loadTickets()

</script>

</body>

</html>
